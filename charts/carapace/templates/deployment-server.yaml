apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "carapace.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: carapace
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: carapace
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: {{ .Release.Name }}-server
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      containers:
        - name: server
          image: {{ include "carapace.serverImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: api
              containerPort: 8321
            - name: proxy
              containerPort: 3128
          env:
            - name: CARAPACE_DATA_DIR
              value: /data
            - name: CARAPACE_SANDBOX_RUNTIME
              value: kubernetes
            - name: CARAPACE_SANDBOX_BASE_IMAGE
              value: {{ include "carapace.sandboxImage" . }}
            - name: CARAPACE_SANDBOX_K8S_NAMESPACE
              value: {{ .Release.Namespace }}
            - name: CARAPACE_SANDBOX_K8S_PVC_CLAIM
              value: {{ .Release.Name }}-data
          {{- if .Values.priorityClassName }}
            - name: CARAPACE_SANDBOX_K8S_PRIORITY_CLASS
              value: {{ .Values.priorityClassName }}
          {{- end }}
          {{- if hasKey .Values.sandbox "ownerRef" }}
            - name: CARAPACE_SANDBOX_K8S_OWNER_REF
              value: {{ .Values.sandbox.ownerRef | quote }}
          {{- end }}
          {{- with .Values.extraEnv }}
          {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- if .Values.config }}
            - name: config
              mountPath: /data/config.yaml
              subPath: config.yaml
              readOnly: true
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
      {{- if .Values.config }}
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
      {{- end }}
