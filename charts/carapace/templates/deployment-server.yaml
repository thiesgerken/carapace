apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "carapace.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: carapace
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: carapace
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: {{ .Release.Name }}-server
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      securityContext:
        fsGroup: 999
      containers:
        - name: server
          image: {{ include "carapace.serverImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: api
              containerPort: {{ .Values.server.apiPort }}
            - name: sandbox-api
              containerPort: {{ .Values.server.sandboxPort }}
            - name: proxy
              containerPort: {{ .Values.server.proxyPort }}
          env:
            - name: CARAPACE_CONFIG
              value: /var/lib/carapace/config.yaml
            - name: CARAPACE_SERVER_PORT
              value: {{ .Values.server.apiPort | quote }}
            - name: CARAPACE_SERVER_SANDBOX_PORT
              value: {{ .Values.server.sandboxPort | quote }}
            - name: CARAPACE_SANDBOX_PROXY_PORT
              value: {{ .Values.server.proxyPort | quote }}
            - name: CARAPACE_SANDBOX_RUNTIME
              value: kubernetes
            - name: CARAPACE_SANDBOX_BASE_IMAGE
              value: {{ include "carapace.sandboxImage" . }}
            - name: CARAPACE_SANDBOX_K8S_NAMESPACE
              value: {{ .Release.Namespace }}
            - name: CARAPACE_SANDBOX_K8S_PVC_CLAIM
              value: {{ .Release.Name }}-data
            - name: CARAPACE_SANDBOX_K8S_APP_INSTANCE
              value: {{ .Release.Name }}
            - name: CARAPACE_SANDBOX_K8S_SERVER_DEPLOYMENT_NAME
              value: {{ .Release.Name }}
            - name: CARAPACE_SANDBOX_K8S_SANDBOXES_NAME
              value: {{ include "carapace.sandboxesName" . | quote }}
            - name: CARAPACE_SANDBOX_K8S_SESSION_PVC_SIZE
              value: {{ .Values.sandbox.sessionPvc.size | quote }}
          {{- if .Values.redis.enabled }}
            - name: CARAPACE_CACHE_REDIS_URL
              value: redis://{{ .Release.Name }}-redis:6379/0
          {{- end }}
          {{- if .Values.sandbox.sessionPvc.storageClass }}
            - name: CARAPACE_SANDBOX_K8S_SESSION_PVC_STORAGE_CLASS
              value: {{ .Values.sandbox.sessionPvc.storageClass | quote }}
          {{- end }}
          {{- with .Values.sandbox.resources }}
          {{- if .requests }}
          {{- if .requests.cpu }}
            - name: CARAPACE_SANDBOX_K8S_RESOURCE_REQUESTS_CPU
              value: {{ .requests.cpu | quote }}
          {{- end }}
          {{- if .requests.memory }}
            - name: CARAPACE_SANDBOX_K8S_RESOURCE_REQUESTS_MEMORY
              value: {{ .requests.memory | quote }}
          {{- end }}
          {{- end }}
          {{- if .limits }}
          {{- if .limits.cpu }}
            - name: CARAPACE_SANDBOX_K8S_RESOURCE_LIMITS_CPU
              value: {{ .limits.cpu | quote }}
          {{- end }}
          {{- if .limits.memory }}
            - name: CARAPACE_SANDBOX_K8S_RESOURCE_LIMITS_MEMORY
              value: {{ .limits.memory | quote }}
          {{- end }}
          {{- end }}
          {{- end }}
          {{- if .Values.resetAssets }}
            - name: CARAPACE_RESET_ASSETS
              value: "true"
          {{- end }}
          {{- if or .Values.sandbox.priorityClassName .Values.priorityClassName }}
            - name: CARAPACE_SANDBOX_K8S_PRIORITY_CLASS
              value: {{ .Values.sandbox.priorityClassName | default .Values.priorityClassName }}
          {{- end }}
          {{- if hasKey .Values.sandbox "ownerRef" }}
            - name: CARAPACE_SANDBOX_K8S_OWNER_REF
              value: {{ .Values.sandbox.ownerRef | quote }}
          {{- end }}
          {{- with .Values.extraEnv }}
          {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/carapace
          {{- if .Values.config }}
            - name: config
              mountPath: /var/lib/carapace/config.yaml
              subPath: config.yaml
              readOnly: true
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 20
          livenessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
      {{- range .Values.bitwarden.instances }}
        - name: {{ .name }}
          image: {{ include "carapace.bitwardenImage" $ }}
          imagePullPolicy: {{ $.Values.bitwarden.image.pullPolicy }}
          env:
            - name: BW_SERVER_URL
              value: {{ .serverUrl | quote }}
            - name: BW_SERVE_PORT
              value: {{ .port | default 8087 | quote }}
          volumeMounts:
            {{- if $.Values.bitwarden.persistence.enabled }}
            - name: bitwarden-data-{{ .name }}
              mountPath: /var/lib/bitwarden-cli
            {{- end }}
            - name: bitwarden-creds-{{ .name }}
              mountPath: /run/secrets/bitwarden
              readOnly: true
          {{- with .resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            exec:
              # bw serve binds 127.0.0.1 only — kubelet tcp probes use the pod IP and would fail.
              command:
                - sh
                - -c
                - curl -sS -o /dev/null --connect-timeout 2 --max-time 5 http://127.0.0.1:{{ .port | default 8087 }}/
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 36
            timeoutSeconds: 6
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - curl -sS -o /dev/null --connect-timeout 2 --max-time 5 http://127.0.0.1:{{ .port | default 8087 }}/
            periodSeconds: 10
            timeoutSeconds: 6
          livenessProbe:
            exec:
              # doubles as a periodic vault sync; must hit localhost (bw not bound on pod IP)
              command:
                - sh
                - -c
                - curl -sS -f -o /dev/null -X POST --connect-timeout 10 --max-time 60 http://127.0.0.1:{{ .port | default 8087 }}/sync
            periodSeconds: 120
            timeoutSeconds: 65
      {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
      {{- if .Values.config }}
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
      {{- end }}
      {{- if $.Values.bitwarden.persistence.enabled }}
      {{- range .Values.bitwarden.instances }}
        - name: bitwarden-data-{{ .name }}
          persistentVolumeClaim:
            claimName: {{ $.Release.Name }}-bitwarden-{{ .name }}
      {{- end }}
      {{- end }}
      {{- range .Values.bitwarden.instances }}
        - name: bitwarden-creds-{{ .name }}
          secret:
            secretName: {{ .existingSecret }}
            defaultMode: 0400
      {{- end }}
