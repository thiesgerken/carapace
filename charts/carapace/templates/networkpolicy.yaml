apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-sandbox-isolation
  labels:
    {{- include "carapace.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: carapace-sandbox
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: carapace
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/component: server
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: carapace
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/component: server
      ports:
        - protocol: TCP
          port: {{ .Values.server.proxyPort }}
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
