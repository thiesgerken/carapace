apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "carapace.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  selector:
    app.kubernetes.io/name: carapace
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: server
  ports:
    - name: api
      port: {{ .Values.server.apiPort }}
      targetPort: api
    - name: sandbox-api
      port: {{ .Values.server.sandboxPort }}
      targetPort: sandbox-api
    - name: proxy
      port: {{ .Values.server.proxyPort }}
      targetPort: proxy
