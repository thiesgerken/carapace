{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "carapace.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- toYaml .Values.ingress.entryPoints | nindent 4 }}
  routes:
    - match: Host(`{{ .Values.ingress.hostname }}`)
      kind: Rule
      services:
        - name: {{ .Release.Name }}
          port: 8321
    {{- if and .Values.frontend.enabled .Values.ingress.frontendPrefixes }}
    - match: Host(`{{ .Values.ingress.hostname }}`) && PathPrefix({{ range $i, $p := .Values.ingress.frontendPrefixes }}{{ if $i }}, {{ end }}`{{ $p }}`{{ end }})
      kind: Rule
      services:
        - name: {{ .Release.Name }}-frontend
          port: 80
    {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
