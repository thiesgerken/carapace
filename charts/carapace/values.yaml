# -- Container image settings
image:
  registry: ghcr.io
  repository: thiesgerken/carapace
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

frontend:
  enabled: true
  image:
    registry: ghcr.io
    repository: thiesgerken/carapace-frontend
    tag: ""  # defaults to appVersion
    pullPolicy: IfNotPresent
  replicas: 1
  resources: {}

sandbox:
  image:
    registry: ghcr.io
    repository: thiesgerken/carapace-sandbox
    tag: ""  # defaults to appVersion

# -- Ingress configuration (Traefik IngressRoute)
ingress:
  enabled: true
  hostname: carapace.example.com
  entryPoints:
    - websecure
  tls:
    certResolver: letsencrypt

# -- Persistence (RWX PVC shared between server and sandbox pods)
persistence:
  # -- Leave empty to use the cluster default StorageClass
  storageClassName: ""
  size: 10Gi

# -- Priority class name for all pods (server, frontend, sandbox)
priorityClassName: ""

# -- Server resource limits
resources: {}
  # limits:
  #   cpu: "2"
  #   memory: 2Gi
  # requests:
  #   cpu: 500m
  #   memory: 512Mi

# -- Extra environment variables injected into the server container
# Example:
#   extraEnv:
#     - name: CARAPACE_LOG_LEVEL
#       value: debug
extraEnv: []

# -- Additional envFrom entries (secretRef / configMapRef) for the server container.
# Use this to inject API keys and other secrets from an externally managed Secret.
# Example:
#   envFrom:
#     - secretRef:
#         name: carapace-secrets
#     - configMapRef:
#         name: carapace-config
envFrom: []
