# -- Container image settings
image:
  registry: ghcr.io
  repository: thiesgerken/carapace
  tag: "" # defaults to appVersion
  pullPolicy: IfNotPresent

frontend:
  enabled: true
  image:
    registry: ghcr.io
    repository: thiesgerken/carapace-frontend
    tag: "" # defaults to appVersion
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

# -- Server ports
server:
  # -- API port (FastAPI / REST + WebSocket)
  apiPort: 8321
  # -- Sandbox-facing API port (Basic Auth, Git HTTP backend)
  sandboxPort: 8322
  # -- Proxy port (sandbox HTTP proxy)
  proxyPort: 3128

sandbox:
  image:
    registry: ghcr.io
    repository: thiesgerken/carapace-sandbox
    tag: "" # defaults to appVersion
  # -- PriorityClass override for sandbox pods (empty = use global priorityClassName)
  priorityClassName: ""
  # -- Resource requests/limits for sandbox containers
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  # -- Per-session PVC settings (StatefulSet mode)
  sessionPvc:
    size: 1Gi
    # -- Leave empty to use the cluster default StorageClass
    storageClass: ""
  # -- Preferred Sandboxes CR name for sandbox StatefulSets; set to null for the release default or "" for Deployment fallback
  sandboxesName:

# -- Ingress configuration (Gateway API HTTPRoute)
ingress:
  enabled: true
  hostname: carapace.example.com
  # -- Gateway parent references (required when ingress is enabled)
  parentRefs:
    - name: default-gateway
  # -- Extra annotations on the HTTPRoute
  annotations: {}

# -- Persistence
persistence:
  # Data PVC (config, sessions, knowledge — server-only, no sandbox access needed)
  data:
    # -- Leave empty to use the cluster default StorageClass
    storageClassName: ""
    size: 10Gi
    # -- Finalizers to protect the PVC from accidental deletion (e.g. by ArgoCD pruning)
    finalizers: []
    # - kubernetes.io/pvc-protection

# -- Priority class name for server and frontend pods (sandbox can override via sandbox.priorityClassName)
priorityClassName: ""

# -- Server resource requests/limits
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    memory: 1Gi

# -- Overwrite existing asset files (SOUL.md, SECURITY.md, bundled skills, …)
# with the versions bundled in the container image on every startup.
resetAssets: false

# -- Application configuration (written to config.yaml and mounted into /data).
# When non-empty a ConfigMap is created and mounted at /data/config.yaml.
# Example:
#   config:
#     agent:
#       model: anthropic:claude-sonnet-4-6
#       sentinel_model: anthropic:claude-haiku-4-5
#     channels:
#       matrix:
#         enabled: true
config: {}

# -- Bitwarden CLI sidecar(s) for Bitwarden-compatible credential backends.
# Each entry spawns a sidecar container running `bw serve` in the server Pod,
# sharing the network namespace so carapace reaches it at 127.0.0.1:<port>.
# The matching credential backend in config.yaml should use type: bitwarden
# with url set to http://127.0.0.1:<port>.
#
# Example:
#   bitwarden:
#     persistence:
#       enabled: true   # set false for ephemeral sidecar (no PVC)
#       size: 256Mi
#       storageClassName: ""
#     instances:
#       - name: bw-personal
#         port: 8087
#         serverUrl: https://vault.example.com
#         existingSecret: carapace-bw-personal
#         # The Secret is mounted as files under /run/secrets/bitwarden (e.g. BW_MASTER_PASSWORD;
#         # BW_CLIENTID + BW_CLIENTSECRET for API key login, or BW_EMAIL for password-only login).
#         resources:
#           requests:
#             cpu: 50m
#             memory: 128Mi
#           limits:
#             memory: 256Mi
bitwarden:
  image:
    registry: ghcr.io
    repository: thiesgerken/carapace-bitwarden-cli
    tag: "" # defaults to appVersion
    pullPolicy: IfNotPresent
  # -- One PVC per bitwarden instance; stores CLI device/session data so redeploys do not
  # trigger a fresh login (and provider "new device" emails). Disable for ephemeral sidecars.
  persistence:
    enabled: true
    size: 256Mi
    storageClassName: ""
  instances: []

# -- Extra environment variables injected into the server container
# Example:
#   extraEnv:
#     - name: CARAPACE_LOG_LEVEL
#       value: debug
extraEnv: []

# -- Additional envFrom entries (secretRef / configMapRef) for the server container.
# Use this to inject API keys and other secrets from an externally managed Secret.
# Example:
#   envFrom:
#     - secretRef:
#         name: carapace-secrets
#     - configMapRef:
#         name: carapace-config
envFrom: []
