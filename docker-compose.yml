services:
  carapace:
    build: .
    tty: true
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8321:8321"
    group_add:
      - ${DOCKER_GID:-0}
    volumes:
      - ./data:/var/lib/carapace
      - /var/run/docker.sock:/var/run/docker.sock
      - ./src/carapace:/app/.venv/lib/python3.14/site-packages/carapace
    environment:
      - CARAPACE_CONFIG=/var/lib/carapace/config.yaml
      - CARAPACE_HOST_DATA_DIR=${PWD}/data
      - CARAPACE_TOKEN=${CARAPACE_TOKEN}
      - CARAPACE_RESET_ASSETS=false
      - CARAPACE_MATRIX_PASSWORD=${CARAPACE_MATRIX_PASSWORD:-}
      - CARAPACE_GIT_TOKEN=${CARAPACE_GIT_TOKEN:-}
      - CARAPACE_CACHE_REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    networks:
      - default
      - carapace-sandbox

  # Bitwarden CLI sidecar — shares carapace's network namespace so bw serve
  # is reachable at 127.0.0.1:8087 from the carapace container.
  # Scaled to 0 by default; enable with: docker compose up -d --scale bw=1
  bw:
    build: ./bitwarden-cli
    image: carapace-bitwarden-cli:latest
    tty: true
    network_mode: service:carapace
    volumes:
      - bitwarden-cli-data:/var/lib/bitwarden-cli
    environment:
      # Empty = US cloud; sidecar reapplies only when this changes (see docs/quickstart.md).
      BW_SERVER_URL: ${BW_SERVER_URL:-}
      BW_EMAIL: ${BW_EMAIL:-}
      BW_CLIENTID: ${BW_CLIENTID:-}
      BW_CLIENTSECRET: ${BW_CLIENTSECRET:-}
      BW_MASTER_PASSWORD: ${BW_MASTER_PASSWORD:-}
    restart: unless-stopped
    scale: 0

  frontend:
    build: ./frontend
    ports:
      - "3001:80"

  redis:
    image: redis:8-alpine@sha256:b9646e7cdf8165d985b88bb3e61b3f2f7625db7f6c98af79def91997d04f26b9
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  sandbox:
    build: ./sandbox
    image: carapace-sandbox:latest
    profiles: ["build"]

volumes:
  bitwarden-cli-data:

networks:
  carapace-sandbox:
    driver: bridge
    internal: true
