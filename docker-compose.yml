services:
  carapace:
    build: .
    tty: true
    ports:
      - "8321:8321"
    group_add:
      - ${DOCKER_GID:-0}
    volumes:
      - ./knowledge:/var/lib/carapace/knowledge
      - ./data:/var/lib/carapace
      - /var/run/docker.sock:/var/run/docker.sock
      - ./src/carapace:/app/.venv/lib/python3.14/site-packages/carapace
    environment:
      - CARAPACE_CONFIG=/var/lib/carapace/config.yaml
      - CARAPACE_HOST_DATA_DIR=${PWD}/data
      - CARAPACE_TOKEN=${CARAPACE_TOKEN}
      - CARAPACE_RESET_ASSETS=true
      - CARAPACE_MATRIX_PASSWORD=${CARAPACE_MATRIX_PASSWORD:-}
      - CARAPACE_GIT_TOKEN=${CARAPACE_GIT_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    networks:
      - default
      - carapace-sandbox

  frontend:
    build: ./frontend
    ports:
      - "3001:80"
    depends_on:
      - carapace

  sandbox:
    build: ./sandbox
    image: carapace-sandbox:latest
    profiles: ["build"]

networks:
  carapace-sandbox:
    driver: bridge
    internal: true
