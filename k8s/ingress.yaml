# Traefik IngressRoute (k3s built-in ingress controller).
# Adjust hostnames to match your domain.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: carapace
  namespace: carapace
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`carapace.example.com`)
      kind: Rule
      services:
        - name: carapace
          port: 8321
    - match: Host(`carapace.example.com`) && PathPrefix(`/_next`, `/favicon`)
      kind: Rule
      services:
        - name: frontend
          port: 80
  tls:
    certResolver: letsencrypt # adjust to your cert-manager / Traefik config
