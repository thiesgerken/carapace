# Restrict sandbox pods: only allow traffic to/from the carapace server proxy.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-isolation
  namespace: carapace
spec:
  podSelector:
    matchLabels:
      app: carapace-sandbox
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow exec from the server pod
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: carapace
              app.kubernetes.io/component: server
  egress:
    # Allow traffic to the proxy port on the carapace service only
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: carapace
              app.kubernetes.io/component: server
      ports:
        - protocol: TCP
          port: 3128
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
