apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: carapace
  labels:
    app.kubernetes.io/name: carapace
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: carapace
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: carapace
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/thiesgerken/carapace-frontend:latest  # pin to a version tag
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
