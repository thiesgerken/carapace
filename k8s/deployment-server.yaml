apiVersion: apps/v1
kind: Deployment
metadata:
  name: carapace
  namespace: carapace
  labels:
    app.kubernetes.io/name: carapace
    app.kubernetes.io/component: server
spec:
  replicas: 1
  strategy:
    type: Recreate # single replica with PVC — avoid RWO conflicts
  selector:
    matchLabels:
      app.kubernetes.io/name: carapace
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: carapace
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: carapace-server
      containers:
        - name: server
          image: ghcr.io/thiesgerken/carapace:latest # pin to a version tag
          ports:
            - name: api
              containerPort: 8321
            - name: proxy
              containerPort: 3128
          env:
            - name: CARAPACE_DATA_DIR
              value: /data
          envFrom:
            - secretRef:
                name: carapace-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: carapace-data
